<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 8 139 121" role="img" aria-label="AscendBooks">
  <!--
    AscendBooks mark, reversed for dark grounds.

    The wings are white here rather than the brand navy #0d1b5e. That navy is
    within a few percent of the site's own navy-900 (#12204a) and navy-800
    (#16275a), so on the hero the wings would vanish and the mark would read
    as a lone orange chevron. The orange is unchanged — it carries the brand
    and holds up against navy at better than 5:1.

    WIZAG's own product, so this adaptation is ours to make.
    Light grounds: use ascendbooks-logo.svg.
  -->
